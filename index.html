<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مقالاتي</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap');
        body { font-family: 'Tajawal', sans-serif; }
        .ql-editor { text-align: right; font-size: 1.1rem; min-height: 200px; }
        .ql-toolbar { background: #f8fafc; border-radius: 12px 12px 0 0; }
        #editor-container { border-radius: 0 0 12px 12px; background: white; }
    </style>
</head>
<body class="bg-slate-50">

    <nav class="bg-blue-900 text-white shadow-md p-4 sticky top-0 z-50">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold italic">مقالاتي</h1>
            <button onclick="document.getElementById('admin-section').scrollIntoView({behavior:'smooth'})" class="bg-white text-blue-900 px-4 py-2 rounded-full text-sm font-bold shadow-sm">إضافة بحث +</button>
        </div>
    </nav>

    <main class="container mx-auto p-4 md:p-8">
        
        <div id="articlesList" class="space-y-8 mb-20">
            <div class="text-center p-20 bg-white rounded-3xl shadow-inner border-2 border-dashed border-gray-200">
                <p class="text-gray-400">لا توجد أبحاث منشورة بعد..</p>
            </div>
        </div>

        <div id="admin-section" class="max-w-3xl mx-auto bg-white p-6 rounded-3xl shadow-2xl border border-blue-50 relative">
            <div class="absolute -top-4 right-6 bg-blue-600 text-white px-4 py-1 rounded-full text-sm">لوحة التحرير</div>
            
            <h2 class="text-2xl font-bold mb-6 text-gray-800">تحرير مقال علمي جديد</h2>
            
            <div class="space-y-6">
                <div>
                    <label class="block text-sm font-bold text-gray-600 mb-2">عنوان البحث</label>
                    <input type="text" id="title" class="w-full p-4 bg-gray-50 border-none rounded-2xl focus:ring-2 focus:ring-blue-500 outline-none text-lg" placeholder="اكتب العنوان هنا...">
                </div>

                <div>
                    <label class="block text-sm font-bold text-gray-600 mb-2">محتوى المقال (استخدم أدوات التنسيق)</label>
                    <div id="editor-container"></div>
                </div>

                <button onclick="publish()" class="w-full bg-blue-900 hover:bg-black text-white font-bold py-4 rounded-2xl shadow-xl transition-all flex items-center justify-center gap-2">
                    <span>نشر البحث في الموقع</span>
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                        <path d="M10.894 2.553a1 1 0 00-1.788 0l-7 14a1 1 0 001.169 1.409l5-1.429A1 1 0 009 15.571V11a1 1 0 112 0v4.571a1 1 0 00.725.962l5 1.428a1 1 0 001.17-1.408l-7-14z" />
                    </svg>
                </button>
            </div>
        </div>
    </main>

    <script>
        // إعداد المحرر Quill
        var quill = new Quill('#editor-container', {
            modules: {
                toolbar: [
                    ['bold', 'italic', 'underline'],
                    [{ 'list': 'ordered'}, { 'list': 'bullet' }],
                    [{ 'header': [1, 2, 3, false] }],
                    ['link', 'clean']
                ]
            },
            placeholder: 'اكتب مقالك أو الصق النص هنا وسيبقى التنسيق كما هو...',
            theme: 'snow'
        });

        function publish() {
            const title = document.getElementById('title').value;
            const content = quill.root.innerHTML; // جلب المحتوى بتنسيق HTML
            const textOnly = quill.getText().trim();

            if(!title || textOnly.length < 5) {
                alert("يرجى كتابة عنوان ومحتوى مناسب للمقال");
                return;
            }

            const list = document.getElementById('articlesList');
            if(list.innerHTML.includes("لا توجد أبحاث")) list.innerHTML = "";

            const articleHTML = `
                <article class="bg-white p-8 rounded-3xl shadow-sm border border-gray-100 hover:shadow-md transition">
                    <h3 class="text-3xl font-bold text-blue-950 mb-4 border-b pb-4">${title}</h3>
                    <div class="prose max-w-none text-gray-700 leading-loose">
                        ${content}
                    </div>
                    <div class="mt-6 pt-4 border-t border-gray-50 flex justify-between items-center text-gray-400 text-sm italic">
                        <span>بواسطة: كاتب المقال</span>
                        <span>${new Date().toLocaleDateString('ar-EG')}</span>
                    </div>
                </article>
            `;

            list.innerHTML = articleHTML + list.innerHTML;
            
            // إعادة ضبط المحرر والعنوان
            document.getElementById('title').value = "";
            quill.setContents([]);
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
    </script>
</body>
</html>
